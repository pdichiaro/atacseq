report_comment: >
  This report has been generated by the <a href="https://github.com/pdichiaro/atacseq" target="_blank">pdichiaro/atacseq</a>
  analysis pipeline. For information about how to interpret these results, please see the
  <a href="https://github.com/pdichiaro/atacseq" target="_blank">documentation</a>.

data_format: "yaml"

export_plots: true

# DESeq2 plot ordering handled by numbered prefixes in:
# - section_name (01., 02., 03., 04.) for visible titles
# - plot IDs and filenames (01_, 02_, 03_, 04_) for MultiQC sorting
# (same approach as pdichiaro/rnaseq)

run_modules:
  - custom_content
  - fastqc
  - cutadapt
  - samtools
  - picard
  - preseq
  - featureCounts
  - deeptools
  - phantompeakqualtools

# Remove specific sections from the report
# Note: Section names must match EXACTLY with the 'name' in module_order
remove_sections:
  - "LIB: SAMTools"  # Hide individual library SAMTools metrics per user request
  - "MERGED LIB: SAMTools (unfiltered)"  # Hide unfiltered SAMTools metrics per user request
  - "MERGED LIB: Picard (unfiltered)"  # Hide unfiltered Picard metrics per user request

module_order:
  - fastqc:
      name: "LIB: FastQC (raw)"
      info: "This section of the report shows FastQC results before adapter trimming for individual libraries."
      path_filters:
        - "./fastqc/*.zip"
  - cutadapt:
      name: "LIB: cutadapt (trimmed)"
      info: "This section of the report shows the length of trimmed reads by cutadapt for individual libraries."
  - fastqc:
      name: "LIB: FastQC (trimmed)"
      info: "This section of the report shows FastQC results after adapter trimming for individual libraries."
      path_filters:
        - "./trimgalore/fastqc/*.zip"
  - samtools:
      name: "LIB: SAMTools"
      info: "This section of the report shows SAMTools results for individual libraries."
      path_filters:
        - "./alignment/library/*"
  - samtools:
      name: "MERGED LIB: SAMTools (unfiltered)"
      info: "This section of the report shows SAMTools results after merging libraries and before filtering."
      path_filters:
        - "./alignment/mergedLibrary/unfiltered/*.mLb.mkD.sorted.bam*"
  - picard:
      name: "MERGED LIB: Picard (unfiltered)"
      info: "This section of the report shows picard results after merging libraries and before filtering."
      path_filters:
        - "./alignment/mergedLibrary/unfiltered/picard_metrics/*"
  - preseq:
      name: "MERGED LIB: Preseq (unfiltered)"
      info: "This section of the report shows Preseq results after merging libraries and before filtering."
  - samtools:
      name: "MERGED LIB: SAMTools (filtered)"
      info: "This section of the report shows SAMTools results after merging libraries and after filtering."
      path_filters:
        - "./alignment/mergedLibrary/filtered/*.mLb.clN.sorted.bam*"
  - picard:
      name: "MERGED LIB: Picard (filtered)"
      info: "This section of the report shows picard results after merging libraries and after filtering."
      path_filters:
        - "./alignment/mergedLibrary/filtered/picard_metrics/*"
  - deeptools:
      name: "MERGED LIB: deepTools"
      anchor: "mlib_deeptools"
      info: "This section of the report shows ATAC-seq QC plots generated by deepTools."
  - featureCounts:
      name: "MERGED LIB: featureCounts"
      anchor: "mlib_featurecounts"
      info: "This section of the report shows featureCounts results for the number of reads assigned to merged library consensus peaks."
      path_filters:
        - "./macs2/featurecounts/*.summary"

report_section_order:
  peak_count:
    before: mlib_deeptools
  frip_score:
    before: peak_count
  peak_annotation:
    before: frip_score
  strand_shift_correlation:
    before: peak_annotation
  nsc_coefficient:
    before: strand_shift_correlation
  rsc_coefficient:
    before: nsc_coefficient
  mlib_featurecounts:
    before: rsc_coefficient
  # DESeq2 parent section positioned after main workflow sections
  # Plot ordering within section handled by numeric prefixes in:
  #   - plot IDs (01_, 02_, 03_, 04_, 05_, 06_, 07_, 08_)
  #   - plot_order values (dynamically set to match plot number)
  # This ensures consistent ordering both in section list and within parent section
  deseq2-featurecounts-qc:
    before: mlib_featurecounts
  # ATAC-seq workflow summary - positioned at the end of report
  nf-core-atacseq-summary:
    order: -999
  # Summary sections at the very end (nf-core style)
  "nf-core-atacseq-methods-description-module":
    order: -1000
  "software_versions-module":
    order: -1001
  "nf-core-atacseq-summary-module":
    order: -1002

custom_plot_config:
  picard_insert_size:
    cpswitch_c_active: False
    smooth_points: 1000
  featurecounts:
    cpswitch_c_active: False
  
  # DESeq2 QC plots ordering (by numeric prefix in plot ID)
  # Plot IDs follow pattern: mqc_NN_deseq2_*_featurecounts_*
  # MultiQC sorts plots alphabetically by ID, so numeric prefixes control order
  # 
  # All Genes (mqc_01 - mqc_04):
  #   01. mqc_01_deseq2_read_distribution_featurecounts_all_genes-plot
  #   02. mqc_02_deseq2_sample_distance_featurecounts_all_genes-plot
  #   03. mqc_03_deseq2_pca_featurecounts_all_genes-plot
  #   04. mqc_04_deseq2_pca_top500_featurecounts_all_genes-plot
  # 
  # Invariant Genes (mqc_05 - mqc_08):
  #   05. mqc_05_deseq2_read_distribution_featurecounts_invariant_genes-plot
  #   06. mqc_06_deseq2_sample_distance_featurecounts_invariant_genes-plot
  #   07. mqc_07_deseq2_pca_featurecounts_invariant_genes-plot
  #   08. mqc_08_deseq2_pca_top500_featurecounts_invariant_genes-plot
  # 
  # No explicit ordering configuration needed - numeric prefixes handle this automatically

# General Statistics Table Configuration
# Optimized for ATAC-seq workflow with logical column ordering
# Key metrics are visible, less critical ones are hidden but available via "Configure Columns"

table_columns_placement:
  # Column order (lower numbers = leftmost columns)
  # Core sequencing metrics
  FastQC:
    total_sequences: 100
    percent_gc: 110
  Cutadapt:
    percent_trimmed: 200
  # Alignment metrics (filtered library - most relevant)
  Samtools:
    reads_mapped: 300
    reads_mapped_percent: 310
    error_rate: 320
  # Duplication metrics
  Picard:
    PERCENT_DUPLICATION: 400
  # Peak calling metrics
  peak_count:
    peak_count: 500
  FRiP:
    frip_score: 510
  # Feature assignment
  featureCounts:
    percent_assigned: 600
    Assigned: 610
  # ATAC-seq quality metrics
  phantompeakqualtools:
    NSC: 700
    RSC: 710

table_columns_visible:
  # FastQC modules - use full module names from module_order
  "LIB: FastQC (raw)":
    total_sequences: True
    percent_duplicates: False
    percent_gc: False
    avg_sequence_length: False
    percent_fails: False
    total_sequences_unit: False
  "LIB: FastQC (trimmed)":
    total_sequences: True
    percent_duplicates: False
    percent_gc: False
    avg_sequence_length: False
    percent_fails: False
    total_sequences_unit: False
  # Cutadapt - show trimming efficiency
  "LIB: cutadapt (trimmed)":
    percent_trimmed: True
    pairs_trimmed: False
  # SAMTools modules - use full module names from module_order
  "LIB: SAMTools: stats":
    reads_mapped: True
    reads_mapped_percent: True
    error_rate: True
    reads_MQ0_percent: True
    non-primary_alignments: True
    reads_properly_paired_percent: True
    raw_total_sequences: True
  "LIB: SAMTools: flagstat":
    mapped_passed: False
    mapped_passed_pct: False
  # SAMTools modules - MergedLibraries
  "MERGED LIB: SAMTools (unfiltered): stats":
    reads_mapped: False
    reads_mapped_percent: False
    error_rate: False
    reads_MQ0_percent: False
    non-primary_alignments: False
    reads_properly_paired_percent: False
    raw_total_sequences: False
  "MERGED LIB: SAMTools (unfiltered): flagstat":
    mapped_passed: False
    mapped_passed_pct: False
  "MERGED LIB: SAMTools (filtered): stats":
    reads_mapped: False
    reads_mapped_percent: False
    error_rate: False
    reads_MQ0_percent: False
    non-primary_alignments: False
    reads_properly_paired_percent: True
    raw_total_sequences: True
  "MERGED LIB: SAMTools (filtered): flagstat":
    mapped_passed: True
    mapped_passed_pct: False
  # Picard modules
  "MERGED LIB: Picard (unfiltered): Mark Duplicates":
    PERCENT_DUPLICATION: True
  "MERGED LIB: Picard (filtered): InsertSizeMetrics":
    Insert Size: False
    Mean Insert: False
  # featureCounts - show assignment metrics
  "MERGED LIB: featureCounts":
    percent_assigned: True
    Assigned: True
    Unassigned_NoFeatures: False
    Unassigned_Ambiguity: False
    Unassigned_MultiMapping: False
  # Preseq - hide by default (specialized metric)
  "MERGED LIB: Preseq (unfiltered)":
    lc_extrap_unique_reads: False
    lc_extrap_max_reads: False
  # Phantom Peak Qual Tools - hide all metrics per user request
  phantompeakqualtools:
    NSC: False
    RSC: False
    phantompeakqualtools_fragment_length: False
    Estimated_Fragment_Length_bp: False
  # Peak metrics - show all (critical for ATAC-seq)
  peak_count:
    peak_count: True
  FRiP:
    frip_score: True

# Color thresholds for key ATAC-seq quality metrics
# Helps quickly identify problematic samples in General Statistics table
table_cond_formatting_rules:
  reads_mapped_percent:
    pass:
      - gt: 70  # Good: >70% mapped
    warn:
      - gt: 50  # Warning: 50-70% mapped
      - lt: 70
    fail:
      - lt: 50  # Fail: <50% mapped
  
  PERCENT_DUPLICATION:
    pass:
      - lt: 30  # Good: <30% duplicates
    warn:
      - gt: 30  # Warning: 30-50% duplicates
      - lt: 50
    fail:
      - gt: 50  # Fail: >50% duplicates
  
  frip_score:
    pass:
      - gt: 5.0  # Good: >5% FRiP (typical for ATAC-seq)
    warn:
      - gt: 1.0  # Warning: 1-5% FRiP
      - lt: 5.0
    fail:
      - lt: 1.0  # Fail: <1% FRiP
  
  NSC:
    pass:
      - gt: 1.05  # Good: NSC >1.05 (ENCODE guideline)
    warn:
      - gt: 1.0  # Warning: NSC 1.0-1.05
      - lt: 1.05
    fail:
      - lt: 1.0  # Fail: NSC <1.0
  
  RSC:
    pass:
      - gt: 1.0  # Good: RSC >1.0 (ENCODE guideline for TF ATAC-seq)
    warn:
      - gt: 0.8  # Warning: RSC 0.8-1.0
      - lt: 1.0
    fail:
      - lt: 0.8  # Fail: RSC <0.8

extra_fn_clean_exts:
  - "fastq.gz"
  - "_trimmed"
  - "_val"
  - "sorted.bam"
  - ".Lb"
  - "mkD"
  - "clN"
  - "mLb"
  - "_peaks"
  - ".FRiP"
  - ".peak"
  - "_spp"
  - ".spp"
  - "lc_extrap"

# # Customise the module search patterns to speed up execution time
# #  - Skip module sub-tools that we are not interested in
# #  - Replace file-content searching with filename pattern searching
# #  - Don't add anything that is the same as the MultiQC default
# # See https://multiqc.info/docs/#optimise-file-search-patterns for details
sp:
  cutadapt:
    fn: "*trimming_report.txt"
  preseq:
    fn: "*.lc_extrap.txt"
  deeptools/plotFingerprintOutRawCounts:
    fn: "*plotFingerprint*"
  deeptools/plotProfile:
    fn: "*plotProfile*"
  phantompeakqualtools/out:
    fn: "*.spp.out"


# DESeq2 plots are now handled dynamically by DESEQ2_TRANSFORM module headers
# The module adds parent_id/parent_name for all quantifiers automatically
# Plot ordering within parent sections is controlled by numbered prefixes (01., 02., 03., 04.)
# in section titles to ensure correct alphabetical sorting (plot_order doesn't work in nested sections)
